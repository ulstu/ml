<text x="515" y="285" font-size="18" font-family="Arial" fill="#183153">Bottleneck</text>
<text x="940" y="340" font-size="18" font-family="Arial" fill="#183153">Decoder</text>
<text x="835" y="68" font-size="18" font-family="Arial" fill="#16a34a">skip connections copy spatial detail</text>
<text x="52" y="385" font-size="18" font-family="Arial" fill="#183153">The left side compresses context, the right side restores resolution. Skip connections prevent small objects and boundaries from disappearing.</text>
